<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zak's Demolition Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

/* START SCREEN */
#startScreen {
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff;
}
#startScreen h1 {
  font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 900;
  text-transform: uppercase; letter-spacing: 4px;
  background: linear-gradient(90deg, #ff6b35, #f7c948, #ff6b35);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmer 2s linear infinite;
  text-shadow: none; margin-bottom: 8px;
  text-align: center; max-width: 90%;
}
#startScreen h2 {
  font-size: clamp(0.9rem, 2vw, 1.3rem); color: #aaa;
  margin-bottom: 20px; font-weight: 400;
}
@keyframes shimmer { to { background-position: 200% center; } }

.section-label {
  font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px;
  color: #888; margin-bottom: 10px; margin-top: 20px;
}

/* MODE TOGGLE */
#modeToggle {
  display: flex; gap: 10px; margin-bottom: 10px;
}
.mode-btn {
  padding: 10px 24px; border-radius: 25px; border: 2px solid #555;
  background: transparent; color: #ccc; font-size: 0.95rem; cursor: pointer;
  transition: all 0.2s; font-weight: 600;
}
.mode-btn:hover { border-color: #ff6b35; color: #ff6b35; }
.mode-btn.selected { background: #ff6b35; color: #fff; border-color: #ff6b35; }

/* COLOR PICKER */
#colorPicker {
  display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center;
  max-width: 700px;
}
.color-swatch {
  width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
  border: 3px solid transparent; transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  font-weight: 700; text-align: center; line-height: 1.1;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 20px rgba(255,255,255,0.4); }

/* DIFFICULTY */
#difficultyPicker {
  display: flex; gap: 10px; margin-bottom: 10px;
}
.diff-btn {
  padding: 10px 28px; border-radius: 25px; border: 2px solid #555;
  background: transparent; color: #ccc; font-size: 1rem; cursor: pointer;
  transition: all 0.2s; font-weight: 600;
}
.diff-btn:hover { border-color: #f7c948; color: #f7c948; }
.diff-btn.selected { background: #f7c948; color: #1a0a2e; border-color: #f7c948; }

/* START BUTTON */
#startBtn {
  margin-top: 25px; padding: 16px 60px; font-size: 1.4rem; font-weight: 800;
  border: none; border-radius: 50px; cursor: pointer;
  background: linear-gradient(135deg, #ff6b35, #e74c3c);
  color: #fff; letter-spacing: 2px; text-transform: uppercase;
  box-shadow: 0 4px 25px rgba(255,107,53,0.5);
  transition: all 0.2s;
}
#startBtn:hover { transform: scale(1.05); box-shadow: 0 6px 35px rgba(255,107,53,0.7); }

/* CONTROLS INFO */
#controlsInfo {
  margin-top: 25px; background: rgba(255,255,255,0.05); border-radius: 12px;
  padding: 15px 25px; font-size: 0.8rem; color: #888; line-height: 1.8;
  text-align: center;
}
#controlsInfo span { color: #f7c948; font-weight: 600; }

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 15px 20px; display: none;
  pointer-events: none;
}
#healthBarOuter {
  width: 250px; height: 22px; background: rgba(0,0,0,0.6);
  border-radius: 11px; border: 2px solid rgba(255,255,255,0.3);
  overflow: hidden;
}
#healthBarInner {
  width: 100%; height: 100%;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  border-radius: 9px; transition: width 0.3s;
}
#boostCount {
  color: #f7c948; font-size: 1.1rem; font-weight: 700;
  margin-top: 8px;
}
#truckStatus {
  position: fixed; top: 15px; right: 20px; z-index: 50;
  display: none; text-align: right;
}
.truck-indicator {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  justify-content: flex-end;
}
.truck-dot {
  width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3);
}
.truck-hp {
  font-size: 0.7rem; color: #ccc; width: 70px;
  background: rgba(0,0,0,0.4); border-radius: 4px; height: 8px;
  overflow: hidden;
}
.truck-hp-inner { height: 100%; background: #2ecc71; transition: width 0.3s; }
.truck-name {
  font-size: 0.6rem; color: #aaa; width: 70px; text-align: right; white-space: nowrap; overflow: hidden;
}

/* SPEED INDICATOR */
#speedIndicator {
  position: fixed; bottom: 20px; left: 20px; z-index: 50;
  color: #fff; font-size: 1.2rem; font-weight: 700;
  display: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* END SCREEN */
#endScreen {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  color: #fff;
}
#endScreen h1 { font-size: 3rem; margin-bottom: 15px; }
#endScreen p { font-size: 1.3rem; color: #ccc; margin-bottom: 30px; }
#restartBtn {
  padding: 14px 50px; font-size: 1.2rem; font-weight: 700;
  border: none; border-radius: 50px; cursor: pointer;
  background: linear-gradient(135deg, #f7c948, #ff6b35);
  color: #1a0a2e; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.2s;
}
#restartBtn:hover { transform: scale(1.05); }

/* COUNTDOWN */
#countdown {
  position: fixed; inset: 0; z-index: 90;
  display: none; align-items: center; justify-content: center;
  font-size: 8rem; font-weight: 900; color: #f7c948;
  text-shadow: 0 0 40px rgba(247,201,72,0.6);
  pointer-events: none;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>Zak's<br>Demolition Derby</h1>
  <h2>Smash. Crash. Be the Last One Standing.</h2>

  <div class="section-label">Game Mode</div>
  <div id="modeToggle">
    <button class="mode-btn selected" data-mode="monster">Monster Trucks</button>
    <button class="mode-btn" data-mode="cars2">Cars 3 Mode</button>
  </div>

  <div class="section-label" id="pickLabel">Pick Your Truck</div>
  <div id="colorPicker"></div>

  <div class="section-label">Difficulty</div>
  <div id="difficultyPicker">
    <button class="diff-btn" data-diff="easy">Easy</button>
    <button class="diff-btn selected" data-diff="medium">Medium</button>
    <button class="diff-btn" data-diff="hard">Hard</button>
  </div>

  <button id="startBtn">START</button>

  <div id="controlsInfo">
    <span>↑↓←→</span> Drive &amp; Steer &nbsp;|&nbsp;
    <span>SPACE</span> Jump &nbsp;|&nbsp;
    <span>ENTER</span> Boost (x3) &nbsp;|&nbsp;
    Last one alive wins!
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="healthBarOuter"><div id="healthBarInner"></div></div>
  <div id="boostCount">BOOST: ⚡⚡⚡</div>
</div>
<div id="truckStatus"></div>
<div id="speedIndicator"></div>

<!-- COUNTDOWN -->
<div id="countdown"></div>

<!-- END SCREEN -->
<div id="endScreen">
  <h1 id="endTitle"></h1>
  <p id="endMessage"></p>
  <button id="restartBtn">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ============================================================
// ZAK'S DEMOLITION DERBY
// ============================================================

// --- CONSTANTS ---
const ARENA_RADIUS = 85;
const WALL_HEIGHT = 8;

// Monster Truck mode colors/names
const TRUCK_COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
  '#9b59b6', '#e91e63', '#00bcd4', '#ff9800'
];
const TRUCK_COLOR_NAMES = [
  'Red', 'Blue', 'Green', 'Orange',
  'Purple', 'Pink', 'Cyan', 'Amber'
];

const GROUND_Y = 1.5;

// Cars 3 mode characters (GLB models)
const CARS2_CHARACTERS = [
  { name: 'Lightning McQueen', color: '#cc1100', glb: 'mcqueen.glb' },
  { name: 'Chick Hicks', color: '#86b828', glb: 'chick.glb' },
  { name: 'The King', color: '#2a6dd4', glb: 'king.glb' },
  { name: 'Mater', color: '#8B6914', glb: 'mater.glb' },
  { name: 'Cruz Ramirez', color: '#f5c518', glb: 'cruz.glb' },
  { name: 'Francesco', color: '#cc1100', glb: 'francesco.glb' },
  { name: 'Cal Weathers', color: '#4a90d9', glb: 'cal.glb' },
  { name: 'Miss Fritter', color: '#d4a017', glb: 'miss_fritter.glb' },
  { name: 'Dr. Damage', color: '#cc3333', glb: 'damage.glb' },
  { name: 'Arvy', color: '#7b8d6e', glb: 'arvy.glb' },
  { name: 'Sally', color: '#5b9bd5', glb: 'sally.glb' },
  { name: 'Ramone', color: '#6a0dad', glb: 'ramone.glb' },
  { name: 'Tractor', color: '#8B7355', glb: 'tractor.glb' },
  { name: 'APB', color: '#1a3a5c', glb: 'apb.glb' },
  { name: 'Sarge', color: '#4a5c2a', glb: 'sarge.glb' },
  { name: 'Filmore', color: '#2e8b57', glb: 'filmore.glb' }
];

// Cache for loaded GLB models
const glbModelCache = {};
const glbLoader = new THREE.GLTFLoader();

function preloadAllGLBModels() {
  return Promise.all(CARS2_CHARACTERS.map(c => {
    return new Promise((resolve, reject) => {
      if (glbModelCache[c.glb]) { resolve(); return; }
      glbLoader.load('/' + c.glb, (gltf) => {
        glbModelCache[c.glb] = gltf.scene;
        resolve();
      }, undefined, (err) => {
        console.error('Failed to load ' + c.glb, err);
        resolve(); // continue even if one fails
      });
    });
  }));
}

// Deep clone a GLTF scene preserving materials and textures
function deepCloneGLTF(source) {
  const clone = source.clone();
  const sourceMeshes = [];
  const cloneMeshes = [];
  source.traverse(node => { if (node.isMesh) sourceMeshes.push(node); });
  clone.traverse(node => { if (node.isMesh) cloneMeshes.push(node); });
  for (let i = 0; i < cloneMeshes.length; i++) {
    // Copy material with all its maps from the source
    const srcMat = sourceMeshes[i].material;
    if (Array.isArray(srcMat)) {
      cloneMeshes[i].material = srcMat.map(m => m.clone());
    } else if (srcMat) {
      cloneMeshes[i].material = srcMat.clone();
    }
  }
  return clone;
}

function createGLBCar(charIndex, index) {
  const char = CARS2_CHARACTERS[charIndex];
  const template = glbModelCache[char.glb];
  if (!template) {
    // Fallback to a simple box if model failed to load
    const group = new THREE.Group();
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(3, 1.5, 5),
      new THREE.MeshStandardMaterial({ color: char.color })
    );
    box.position.y = 1.5;
    group.add(box);
    return { mesh: group, wheels: [], color: char.color, charName: char.name, index };
  }

  // Deep clone using SkeletonUtils-style clone to preserve materials & textures
  const model = deepCloneGLTF(template);

  // Compute bounding box to auto-scale
  const bbox = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  bbox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const targetSize = 5.0; // target ~5 units long
  const scaleFactor = targetSize / maxDim;
  model.scale.multiplyScalar(scaleFactor);

  // Recompute bbox after scale to center and ground the model
  const bbox2 = new THREE.Box3().setFromObject(model);
  const center = new THREE.Vector3();
  bbox2.getCenter(center);
  const minY = bbox2.min.y;
  model.position.set(-center.x, -minY + 0.1, -center.z);

  // Wrap in a group so position/rotation works like existing trucks
  const group = new THREE.Group();
  group.add(model);
  group.position.y = GROUND_Y;

  // Enable shadows on all meshes
  const wheels = [];
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
    // Try to find wheel parts by name for spinning
    if (child.name && child.name.toLowerCase().includes('wheel')) {
      wheels.push(child);
    }
  });

  return { mesh: group, wheels, color: char.color, charName: char.name, index };
}

const MAX_HEALTH = 100;
const BOOST_FORCE = 2.5;
const JUMP_FORCE = 0.35;
const GRAVITY = -0.015;
const MAX_SPEED = 0.8;
const ACCELERATION = 0.018;
const BRAKE_FORCE = 0.025;
const REVERSE_MAX = 0.35;
const TURN_SPEED = 0.04;
const FRICTION = 0.985;
const HIT_SELF_DAMAGE_RATIO = 0.15;

// --- GAME STATE ---
let scene, camera, renderer;
let playerIndex = 0;
let difficulty = 'medium';
let gameMode = 'monster'; // 'monster' or 'cars2'
let trucks = [];
let obstacles = [];
let ramps = [];
let gameRunning = false;
let keys = {};
let boostsLeft = 3;
let eliminationOrder = [];
let confettiParticles = [];

// --- AUDIO CONTEXT ---
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const gain = audioCtx.createGain();
  gain.connect(audioCtx.destination);

  if (type === 'crash') {
    // Deep crunchy impact sound
    const duration = 0.4;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t2 = i / audioCtx.sampleRate;
      // Heavy low-freq impact thump
      const thump = Math.sin(t2 * 60 * Math.PI * 2) * Math.exp(-t2 * 12);
      // Crunchy metal noise layer
      const crunch = (Math.random() * 2 - 1) * Math.exp(-t2 * 8) * 0.6;
      // Sub bass hit
      const sub = Math.sin(t2 * 30 * Math.PI * 2) * Math.exp(-t2 * 10) * 0.5;
      data[i] = (thump + crunch + sub) * 0.5;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 500;
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
    src.connect(filter); filter.connect(gain); src.start(now);
  } else if (type === 'boost') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.3);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.connect(gain); osc.start(now); osc.stop(now + 0.4);
  } else if (type === 'jump') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(500, now + 0.15);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    osc.connect(gain); osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'land') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(100, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    osc.connect(gain); osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'eliminate') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    src.connect(gain); src.start(now);
  } else if (type === 'victory') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, now + i * 0.15);
      g.gain.linearRampToValueAtTime(0.15, now + i * 0.15 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4);
    });
  } else if (type === 'cheer') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.15 * Math.sin(i / data.length * Math.PI);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 2000; filter.Q.value = 0.5;
    gain.gain.setValueAtTime(0.3, now);
    src.connect(filter); filter.connect(gain); src.start(now);
  }
}

// --- ENGINE SOUND (soft rumble) ---
let engineNodes = [];
let engineMasterGain;
function startEngineSound() {
  if (!audioCtx) return;
  engineMasterGain = audioCtx.createGain();
  engineMasterGain.gain.value = 0.04;
  engineMasterGain.connect(audioCtx.destination);

  // Soft sine-based engine hum
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 35;
  const g1 = audioCtx.createGain();
  g1.gain.value = 0.4;
  osc1.connect(g1);
  g1.connect(engineMasterGain);
  osc1.start();

  // Gentle overtone
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 70;
  const g2 = audioCtx.createGain();
  g2.gain.value = 0.15;
  osc2.connect(g2);
  g2.connect(engineMasterGain);
  osc2.start();

  // Very quiet filtered rumble
  const bufLen = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const noiseData = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  noiseSrc.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.value = 80;
  noiseFilter.Q.value = 1;
  const g3 = audioCtx.createGain();
  g3.gain.value = 0.1;
  noiseSrc.connect(noiseFilter);
  noiseFilter.connect(g3);
  g3.connect(engineMasterGain);
  noiseSrc.start();

  engineNodes = [
    { osc: osc1, gain: g1, base: 35 },
    { osc: osc2, gain: g2, base: 70 },
    { src: noiseSrc, gain: g3, filter: noiseFilter }
  ];
}
function updateEngineSound(speed) {
  if (!engineNodes.length) return;
  const s = Math.abs(speed);
  if (engineNodes[0].osc) engineNodes[0].osc.frequency.value = 35 + s * 50;
  if (engineNodes[1].osc) engineNodes[1].osc.frequency.value = 70 + s * 100;
  if (engineNodes[2].filter) engineNodes[2].filter.frequency.value = 80 + s * 200;
  if (engineMasterGain) engineMasterGain.gain.value = 0.03 + s * 0.06;
}
function stopEngineSound() {
  engineNodes.forEach(n => {
    try { if (n.osc) n.osc.stop(); } catch(e){}
    try { if (n.src) n.src.stop(); } catch(e){}
  });
  engineNodes = [];
}

// --- CROWD AMBIENT ---
let crowdSource, crowdGain;
function startCrowdAmbient() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.08 * (0.7 + 0.3 * Math.sin(i / audioCtx.sampleRate * 2));
  }
  crowdSource = audioCtx.createBufferSource();
  crowdSource.buffer = buf;
  crowdSource.loop = true;
  crowdGain = audioCtx.createGain();
  crowdGain.gain.value = 0.12;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 1500; filter.Q.value = 0.3;
  crowdSource.connect(filter);
  filter.connect(crowdGain);
  crowdGain.connect(audioCtx.destination);
  crowdSource.start();
}
function stopCrowdAmbient() {
  if (crowdSource) { try { crowdSource.stop(); } catch(e){} crowdSource = null; }
}

// --- BACKGROUND MUSIC ---
let bgMusic;
function startBgMusic() {
  if (!bgMusic) {
    bgMusic = new Audio('music.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.4;
  }
  bgMusic.currentTime = 0;
  bgMusic.play().catch(e => {});
}
function stopBgMusic() {
  if (bgMusic) { bgMusic.pause(); }
}

// ============================================================
// MODE TOGGLE & PICKER
// ============================================================
function buildColorPicker() {
  const colorPickerEl = document.getElementById('colorPicker');
  colorPickerEl.innerHTML = '';
  const pickLabel = document.getElementById('pickLabel');

  if (gameMode === 'monster') {
    pickLabel.textContent = 'Pick Your Truck';
    TRUCK_COLORS.forEach((c, i) => {
      const swatch = document.createElement('div');
      swatch.className = 'color-swatch' + (i === playerIndex ? ' selected' : '');
      swatch.style.background = c;
      swatch.title = TRUCK_COLOR_NAMES[i];
      swatch.textContent = TRUCK_COLOR_NAMES[i];
      swatch.onclick = () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
        playerIndex = i;
      };
      colorPickerEl.appendChild(swatch);
    });
    if (playerIndex >= TRUCK_COLORS.length) playerIndex = 0;
  } else {
    pickLabel.textContent = 'Pick Your Character';
    CARS2_CHARACTERS.forEach((c, i) => {
      const swatch = document.createElement('div');
      swatch.className = 'color-swatch' + (i === playerIndex ? ' selected' : '');
      swatch.style.background = c.color;
      swatch.title = c.name;
      swatch.textContent = c.name;
      swatch.style.width = '80px';
      swatch.style.height = '55px';
      swatch.style.fontSize = '0.5rem';
      swatch.onclick = () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
        playerIndex = i;
      };
      colorPickerEl.appendChild(swatch);
    });
    if (playerIndex >= CARS2_CHARACTERS.length) playerIndex = 0;
  }
}

// Mode toggle buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    gameMode = btn.dataset.mode;
    playerIndex = 0;
    buildColorPicker();
  };
});

// Difficulty picker
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty = btn.dataset.diff;
  };
});

// Initial build
buildColorPicker();

// --- START / RESTART ---
document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = () => {
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
};

// --- KEYBOARD ---
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// BUILD SCENE
// ============================================================
function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a0a2e);
  scene.fog = new THREE.Fog(0x1a0a2e, 120, 200);

  // LIGHTS
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xfff4e0, 0.8);
  dirLight.position.set(30, 50, 20);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Stadium spotlights
  const spotColors = [0xff6b35, 0xf7c948, 0x3498db, 0x2ecc71];
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const spot = new THREE.SpotLight(spotColors[i], 0.6, 200, 0.5, 0.5);
    spot.position.set(Math.cos(angle) * 70, 40, Math.sin(angle) * 70);
    spot.target.position.set(0, 0, 0);
    scene.add(spot);
    scene.add(spot.target);

    const poleGeo = new THREE.CylinderGeometry(0.3, 0.5, 40, 6);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(Math.cos(angle) * 72, 20, Math.sin(angle) * 72);
    scene.add(pole);

    const fixGeo = new THREE.BoxGeometry(3, 1, 3);
    const fixMat = new THREE.MeshStandardMaterial({ color: spotColors[i], emissive: spotColors[i], emissiveIntensity: 0.8 });
    const fix = new THREE.Mesh(fixGeo, fixMat);
    fix.position.set(Math.cos(angle) * 70, 40, Math.sin(angle) * 70);
    scene.add(fix);
  }

  // GROUND
  const groundGeo = new THREE.CircleGeometry(ARENA_RADIUS, 64);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 1.0 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // Dirt texture lines
  for (let i = 0; i < 30; i++) {
    const len = 5 + Math.random() * 20;
    const lineGeo = new THREE.PlaneGeometry(len, 0.3 + Math.random() * 0.5);
    const lineMat = new THREE.MeshStandardMaterial({ color: 0x7a5c10, roughness: 1 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.rotation.z = Math.random() * Math.PI;
    const dist = Math.random() * (ARENA_RADIUS - 10);
    const ang = Math.random() * Math.PI * 2;
    line.position.set(Math.cos(ang) * dist, 0.01, Math.sin(ang) * dist);
    scene.add(line);
  }

  // WALLS
  const wallSegments = 48;
  for (let i = 0; i < wallSegments; i++) {
    const angle = (i / wallSegments) * Math.PI * 2;
    const nextAngle = ((i + 1) / wallSegments) * Math.PI * 2;
    const wallGeo = new THREE.BoxGeometry(
      2 * ARENA_RADIUS * Math.sin(Math.PI / wallSegments), WALL_HEIGHT, 2
    );
    const wallMat = new THREE.MeshStandardMaterial({
      color: i % 2 === 0 ? 0xcc3333 : 0xeeeeee
    });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    const midAngle = (angle + nextAngle) / 2;
    wall.position.set(
      Math.cos(midAngle) * (ARENA_RADIUS + 0.5),
      WALL_HEIGHT / 2,
      Math.sin(midAngle) * (ARENA_RADIUS + 0.5)
    );
    wall.rotation.y = -midAngle + Math.PI / 2;
    scene.add(wall);
  }

  // STADIUM STANDS
  for (let tier = 0; tier < 3; tier++) {
    const r = ARENA_RADIUS + 5 + tier * 8;
    const h = WALL_HEIGHT + tier * 5;
    const standGeo = new THREE.TorusGeometry(r, 3, 4, 48);
    const standMat = new THREE.MeshStandardMaterial({
      color: tier === 0 ? 0x555555 : tier === 1 ? 0x444444 : 0x333333
    });
    const stand = new THREE.Mesh(standGeo, standMat);
    stand.rotation.x = Math.PI / 2;
    stand.position.y = h;
    scene.add(stand);

    const fanCount = 80 + tier * 40;
    for (let f = 0; f < fanCount; f++) {
      const ang = (f / fanCount) * Math.PI * 2;
      const fanGeo = new THREE.SphereGeometry(0.4, 4, 4);
      const fanColor = [0xff6b35, 0xf7c948, 0x3498db, 0xe74c3c, 0x2ecc71, 0xff69b4, 0xffffff][Math.floor(Math.random() * 7)];
      const fanMat = new THREE.MeshStandardMaterial({ color: fanColor });
      const fan = new THREE.Mesh(fanGeo, fanMat);
      fan.position.set(
        Math.cos(ang) * (r + (Math.random() - 0.5) * 4),
        h + 1.5 + Math.random() * 2,
        Math.sin(ang) * (r + (Math.random() - 0.5) * 4)
      );
      fan.userData.baseY = fan.position.y;
      fan.userData.bobSpeed = 2 + Math.random() * 3;
      fan.userData.bobAmp = 0.2 + Math.random() * 0.3;
      scene.add(fan);
      obstacles.push({ mesh: fan, type: 'fan' });
    }
  }

  // TITLE SIGN
  const signGeo = new THREE.BoxGeometry(40, 8, 1);
  const signMat = new THREE.MeshStandardMaterial({ color: 0x1a0a2e });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(0, 28, -(ARENA_RADIUS + 25));
  scene.add(sign);

  const signBorderGeo = new THREE.BoxGeometry(42, 9, 0.5);
  const signBorderMat = new THREE.MeshStandardMaterial({ color: 0xf7c948, emissive: 0xf7c948, emissiveIntensity: 0.5 });
  const signBorder = new THREE.Mesh(signBorderGeo, signBorderMat);
  signBorder.position.set(0, 28, -(ARENA_RADIUS + 25.3));
  scene.add(signBorder);

  // RAMPS
  const rampPositions = [
    { x: 25, z: 0, ry: 0 },
    { x: -25, z: 0, ry: Math.PI },
    { x: 0, z: 25, ry: Math.PI / 2 },
    { x: 0, z: -25, ry: -Math.PI / 2 },
  ];
  const rampColor = 0xff6b20;
  rampPositions.forEach(rp => {
    const rampGroup = new THREE.Group();
    rampGroup.position.set(rp.x, 0, rp.z);
    rampGroup.rotation.y = rp.ry;

    const rampW = 8;
    const rampLen = 12;
    const rampH = 3.5;
    const segments = 16;
    const rampMat = new THREE.MeshStandardMaterial({ color: rampColor, roughness: 0.6, side: THREE.DoubleSide });

    for (let i = 0; i < segments; i++) {
      const t0 = i / segments;
      const t1 = (i + 1) / segments;
      const z0 = -rampLen / 2 + t0 * rampLen;
      const z1 = -rampLen / 2 + t1 * rampLen;
      const y0 = Math.sin(t0 * Math.PI / 2) * rampH;
      const y1 = Math.sin(t1 * Math.PI / 2) * rampH;
      const segLen = Math.sqrt((z1 - z0) ** 2 + (y1 - y0) ** 2);
      const segAngle = Math.atan2(y1 - y0, z1 - z0);

      const seg = new THREE.Mesh(new THREE.BoxGeometry(rampW, 0.15, segLen + 0.05), rampMat);
      seg.position.set(0, (y0 + y1) / 2, (z0 + z1) / 2);
      seg.rotation.x = -segAngle;
      rampGroup.add(seg);
    }

    const sideMat = new THREE.MeshStandardMaterial({ color: 0xe05a10, roughness: 0.7 });
    [-rampW / 2 - 0.15, rampW / 2 + 0.15].forEach(x => {
      for (let i = 0; i < segments; i++) {
        const t0 = i / segments;
        const t1 = (i + 1) / segments;
        const z0 = -rampLen / 2 + t0 * rampLen;
        const z1 = -rampLen / 2 + t1 * rampLen;
        const y0 = Math.sin(t0 * Math.PI / 2) * rampH;
        const y1 = Math.sin(t1 * Math.PI / 2) * rampH;
        const segLen = Math.sqrt((z1 - z0) ** 2 + (y1 - y0) ** 2);
        const segAngle = Math.atan2(y1 - y0, z1 - z0);
        const wallH = 0.8;

        const wall = new THREE.Mesh(new THREE.BoxGeometry(0.15, wallH, segLen + 0.05), sideMat);
        wall.position.set(x, (y0 + y1) / 2 + wallH / 2, (z0 + z1) / 2);
        wall.rotation.x = -segAngle;
        rampGroup.add(wall);
      }
    });

    const padGeo = new THREE.BoxGeometry(rampW, 0.2, 3);
    const pad = new THREE.Mesh(padGeo, rampMat);
    pad.position.set(0, rampH, rampLen / 2 + 1);
    rampGroup.add(pad);

    scene.add(rampGroup);
    ramps.push({ mesh: rampGroup, x: rp.x, z: rp.z, halfW: 4, halfD: 7, ry: rp.ry });
  });

  // CRATES
  for (let i = 0; i < 15; i++) {
    const size = 1.2 + Math.random() * 1.5;
    const crateGeo = new THREE.BoxGeometry(size, size, size);
    const crateMat = new THREE.MeshStandardMaterial({ color: 0xc8a25c });
    const crate = new THREE.Mesh(crateGeo, crateMat);
    const dist = 10 + Math.random() * 55;
    const ang = Math.random() * Math.PI * 2;
    crate.position.set(Math.cos(ang) * dist, size / 2, Math.sin(ang) * dist);
    crate.rotation.y = Math.random() * Math.PI;

    const stripGeo = new THREE.BoxGeometry(size * 0.1, size, size * 1.02);
    const stripMat = new THREE.MeshStandardMaterial({ color: 0x8B6914 });
    const strip1 = new THREE.Mesh(stripGeo, stripMat);
    crate.add(strip1);
    const strip2 = new THREE.Mesh(new THREE.BoxGeometry(size * 1.02, size, size * 0.1), stripMat);
    crate.add(strip2);

    scene.add(crate);
    obstacles.push({ mesh: crate, type: 'crate', vx: 0, vz: 0, size, active: true });
  }

  // BARRELS
  for (let i = 0; i < 20; i++) {
    const barrelGeo = new THREE.CylinderGeometry(0.7, 0.7, 1.8, 12);
    const barrelColor = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12][i % 4];
    const barrelMat = new THREE.MeshStandardMaterial({ color: barrelColor });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    const dist = 8 + Math.random() * 60;
    const ang = Math.random() * Math.PI * 2;
    barrel.position.set(Math.cos(ang) * dist, 0.9, Math.sin(ang) * dist);

    const bandGeo = new THREE.TorusGeometry(0.72, 0.06, 4, 12);
    const bandMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const band1 = new THREE.Mesh(bandGeo, bandMat);
    band1.position.y = 0.4;
    band1.rotation.x = Math.PI / 2;
    barrel.add(band1);
    const band2 = band1.clone();
    band2.position.y = -0.4;
    barrel.add(band2);

    scene.add(barrel);
    obstacles.push({ mesh: barrel, type: 'barrel', vx: 0, vz: 0, active: true });
  }
}

// ============================================================
// BUILD THUNDER HOLLOW SCENE (Cars 3 Mode)
// ============================================================
function buildThunderHollowScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080810);
  scene.fog = new THREE.Fog(0x080810, 100, 220);

  // --- LIGHTING: warm county-fair night ---
  const ambient = new THREE.AmbientLight(0xffeedd, 0.25);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffe4b5, 0.5);
  dirLight.position.set(20, 40, 15);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Warm amber/yellow floodlights
  const spotColors = [0xffaa33, 0xf7c948, 0xff9933, 0xf5b041];
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const spot = new THREE.SpotLight(spotColors[i], 0.7, 220, 0.5, 0.5);
    spot.position.set(Math.cos(angle) * 70, 35, Math.sin(angle) * 70);
    spot.target.position.set(0, 0, 0);
    scene.add(spot);
    scene.add(spot.target);

    // Rusty wooden poles
    const poleGeo = new THREE.CylinderGeometry(0.4, 0.6, 35, 6);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(Math.cos(angle) * 72, 17.5, Math.sin(angle) * 72);
    scene.add(pole);

    // Light fixture boxes with warm glow
    const fixGeo = new THREE.BoxGeometry(4, 1.5, 4);
    const fixMat = new THREE.MeshStandardMaterial({ color: spotColors[i], emissive: spotColors[i], emissiveIntensity: 0.9 });
    const fix = new THREE.Mesh(fixGeo, fixMat);
    fix.position.set(Math.cos(angle) * 70, 35, Math.sin(angle) * 70);
    scene.add(fix);
  }

  // --- GROUND: muddy dirt arena ---
  const groundGeo = new THREE.CircleGeometry(ARENA_RADIUS, 64);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x6b4e1f, roughness: 1.0 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // Mud puddles (darker wet patches)
  for (let i = 0; i < 18; i++) {
    const size = 3 + Math.random() * 8;
    const puddleGeo = new THREE.CircleGeometry(size, 16);
    const puddleMat = new THREE.MeshStandardMaterial({ color: 0x3d2b10, roughness: 0.4, metalness: 0.2 });
    const puddle = new THREE.Mesh(puddleGeo, puddleMat);
    puddle.rotation.x = -Math.PI / 2;
    const dist = Math.random() * (ARENA_RADIUS - 15);
    const ang = Math.random() * Math.PI * 2;
    puddle.position.set(Math.cos(ang) * dist, 0.02, Math.sin(ang) * dist);
    scene.add(puddle);
  }

  // Tire track ruts in dirt
  for (let i = 0; i < 40; i++) {
    const len = 6 + Math.random() * 25;
    const lineGeo = new THREE.PlaneGeometry(len, 0.4 + Math.random() * 0.6);
    const lineMat = new THREE.MeshStandardMaterial({ color: 0x4a3515, roughness: 1 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.rotation.z = Math.random() * Math.PI;
    const dist = Math.random() * (ARENA_RADIUS - 10);
    const ang = Math.random() * Math.PI * 2;
    line.position.set(Math.cos(ang) * dist, 0.01, Math.sin(ang) * dist);
    scene.add(line);
  }

  // --- FIGURE-8 CROSSOVER RAMP (center) ---
  const crossGroup = new THREE.Group();
  const crossMat = new THREE.MeshStandardMaterial({ color: 0x6b4e1f, roughness: 0.8 });
  // Raised crossing bridge
  const bridgeDeck = new THREE.Mesh(new THREE.BoxGeometry(10, 0.4, 18), crossMat);
  bridgeDeck.position.set(0, 2.5, 0);
  crossGroup.add(bridgeDeck);
  // Support pillars under bridge
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9 });
  [[-3, -6], [-3, 6], [3, -6], [3, 6]].forEach(([px, pz]) => {
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 2.5, 6), pillarMat);
    pillar.position.set(px, 1.25, pz);
    crossGroup.add(pillar);
  });
  // Approach ramps for the bridge
  const rampUpMat = new THREE.MeshStandardMaterial({ color: 0x7a5c2a, roughness: 0.7, side: THREE.DoubleSide });
  [[-1, -14], [1, 14]].forEach(([dir, zOff]) => {
    const rampGeo = new THREE.BoxGeometry(10, 0.3, 8);
    const ramp = new THREE.Mesh(rampGeo, rampUpMat);
    ramp.position.set(0, 1.25, zOff * 0.5);
    ramp.rotation.x = dir * 0.3;
    crossGroup.add(ramp);
  });
  scene.add(crossGroup);
  ramps.push({ mesh: crossGroup, x: 0, z: 0, halfW: 5, halfD: 14, ry: 0 });

  // --- WALLS: wooden fence with tire stacks ---
  const wallSegments = 48;
  for (let i = 0; i < wallSegments; i++) {
    const angle = (i / wallSegments) * Math.PI * 2;
    const nextAngle = ((i + 1) / wallSegments) * Math.PI * 2;
    const midAngle = (angle + nextAngle) / 2;

    // Wooden fence planks
    const wallGeo = new THREE.BoxGeometry(
      2 * ARENA_RADIUS * Math.sin(Math.PI / wallSegments), WALL_HEIGHT, 1.5
    );
    const woodColor = i % 3 === 0 ? 0x6b4226 : i % 3 === 1 ? 0x7a5230 : 0x5c3a1e;
    const wallMat = new THREE.MeshStandardMaterial({ color: woodColor, roughness: 0.9 });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(
      Math.cos(midAngle) * (ARENA_RADIUS + 0.5),
      WALL_HEIGHT / 2,
      Math.sin(midAngle) * (ARENA_RADIUS + 0.5)
    );
    wall.rotation.y = -midAngle + Math.PI / 2;
    scene.add(wall);

    // Horizontal plank lines on fence
    if (i % 2 === 0) {
      for (let p = 0; p < 3; p++) {
        const plankGeo = new THREE.BoxGeometry(
          2 * ARENA_RADIUS * Math.sin(Math.PI / wallSegments) * 0.95, 0.15, 0.1
        );
        const plankMat = new THREE.MeshStandardMaterial({ color: 0x4a2e14, roughness: 1 });
        const plank = new THREE.Mesh(plankGeo, plankMat);
        plank.position.set(
          Math.cos(midAngle) * (ARENA_RADIUS + 1.3),
          2 + p * 2.5,
          Math.sin(midAngle) * (ARENA_RADIUS + 1.3)
        );
        plank.rotation.y = -midAngle + Math.PI / 2;
        scene.add(plank);
      }
    }
  }

  // Tire stacks along the fence (every ~30 degrees)
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const stackGroup = new THREE.Group();
    const tireStackMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95 });
    for (let t = 0; t < 3; t++) {
      const tire = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.5, 8, 12), tireStackMat);
      tire.rotation.x = Math.PI / 2;
      tire.position.y = t * 1.0;
      stackGroup.add(tire);
    }
    stackGroup.position.set(
      Math.cos(angle) * (ARENA_RADIUS - 2),
      0.5,
      Math.sin(angle) * (ARENA_RADIUS - 2)
    );
    scene.add(stackGroup);
  }

  // --- STANDS: rickety wooden bleachers ---
  for (let tier = 0; tier < 3; tier++) {
    const r = ARENA_RADIUS + 5 + tier * 8;
    const h = WALL_HEIGHT + tier * 4;
    const standGeo = new THREE.TorusGeometry(r, 2.5, 4, 48);
    const woodColors = [0x7a5230, 0x6b4226, 0x5c3a1e];
    const standMat = new THREE.MeshStandardMaterial({ color: woodColors[tier], roughness: 0.9 });
    const stand = new THREE.Mesh(standGeo, standMat);
    stand.rotation.x = Math.PI / 2;
    stand.position.y = h;
    scene.add(stand);

    // Wooden support beams under stands
    if (tier > 0) {
      for (let b = 0; b < 24; b++) {
        const bAngle = (b / 24) * Math.PI * 2;
        const beam = new THREE.Mesh(
          new THREE.CylinderGeometry(0.2, 0.25, h, 4),
          new THREE.MeshStandardMaterial({ color: 0x4a2e14, roughness: 1 })
        );
        beam.position.set(Math.cos(bAngle) * r, h / 2, Math.sin(bAngle) * r);
        scene.add(beam);
      }
    }

    // Fans/spectators
    const fanCount = 80 + tier * 40;
    for (let f = 0; f < fanCount; f++) {
      const ang = (f / fanCount) * Math.PI * 2;
      const fanGeo = new THREE.SphereGeometry(0.4, 4, 4);
      // Country/rustic fan colors — flannel reds, blues, whites, browns
      const fanColor = [0xcc3333, 0x3366aa, 0xeeeeee, 0x8B6914, 0xff6633, 0xdddddd, 0x996633][Math.floor(Math.random() * 7)];
      const fanMat = new THREE.MeshStandardMaterial({ color: fanColor });
      const fan = new THREE.Mesh(fanGeo, fanMat);
      fan.position.set(
        Math.cos(ang) * (r + (Math.random() - 0.5) * 4),
        h + 1.5 + Math.random() * 2,
        Math.sin(ang) * (r + (Math.random() - 0.5) * 4)
      );
      fan.userData.baseY = fan.position.y;
      fan.userData.bobSpeed = 2 + Math.random() * 3;
      fan.userData.bobAmp = 0.2 + Math.random() * 0.3;
      scene.add(fan);
      obstacles.push({ mesh: fan, type: 'fan' });
    }
  }

  // --- THUNDER HOLLOW SIGN (neon-style) ---
  const signGeo = new THREE.BoxGeometry(48, 10, 1);
  const signMat = new THREE.MeshStandardMaterial({ color: 0x1a0a05 });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(0, 30, -(ARENA_RADIUS + 25));
  scene.add(sign);

  // Neon border glow
  const signBorderGeo = new THREE.BoxGeometry(50, 11, 0.5);
  const signBorderMat = new THREE.MeshStandardMaterial({ color: 0xff6622, emissive: 0xff6622, emissiveIntensity: 0.7 });
  const signBorder = new THREE.Mesh(signBorderGeo, signBorderMat);
  signBorder.position.set(0, 30, -(ARENA_RADIUS + 25.3));
  scene.add(signBorder);

  // "THUNDER HOLLOW" text lights (row of glowing boxes)
  const letterColors = [0xff4400, 0xff6600, 0xff8800, 0xffaa00];
  for (let i = 0; i < 14; i++) {
    const letterGeo = new THREE.BoxGeometry(2.5, 4, 0.3);
    const lc = letterColors[i % letterColors.length];
    const letterMat = new THREE.MeshStandardMaterial({ color: lc, emissive: lc, emissiveIntensity: 0.6 });
    const letter = new THREE.Mesh(letterGeo, letterMat);
    letter.position.set(-17 + i * 2.6, 30, -(ARENA_RADIUS + 24.5));
    scene.add(letter);
  }

  // Small neon accent signs around arena
  for (let i = 0; i < 4; i++) {
    const nAngle = (i / 4) * Math.PI * 2 + 0.4;
    const neonGeo = new THREE.BoxGeometry(6, 3, 0.3);
    const neonColor = [0xff4400, 0x00ff44, 0xffaa00, 0xff2266][i];
    const neonMat = new THREE.MeshStandardMaterial({ color: neonColor, emissive: neonColor, emissiveIntensity: 0.5 });
    const neon = new THREE.Mesh(neonGeo, neonMat);
    neon.position.set(
      Math.cos(nAngle) * (ARENA_RADIUS + 12),
      15,
      Math.sin(nAngle) * (ARENA_RADIUS + 12)
    );
    neon.rotation.y = -nAngle + Math.PI / 2;
    scene.add(neon);
  }

  // --- STARS in the sky ---
  for (let i = 0; i < 200; i++) {
    const starGeo = new THREE.SphereGeometry(0.15 + Math.random() * 0.2, 4, 4);
    const starMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.8 });
    const star = new THREE.Mesh(starGeo, starMat);
    const sAngle = Math.random() * Math.PI * 2;
    const sHeight = 60 + Math.random() * 80;
    const sRadius = 80 + Math.random() * 100;
    star.position.set(Math.cos(sAngle) * sRadius, sHeight, Math.sin(sAngle) * sRadius);
    scene.add(star);
  }

  // --- OBSTACLES: hay bales and tire stacks ---
  // Hay bales (replace crates)
  for (let i = 0; i < 15; i++) {
    const hayGroup = new THREE.Group();
    const hayW = 1.5 + Math.random() * 1.5;
    const hayH = 1.0 + Math.random() * 0.5;
    const hayD = hayW * 0.7;
    const hayGeo = new THREE.BoxGeometry(hayW, hayH, hayD);
    const hayMat = new THREE.MeshStandardMaterial({ color: 0xd4b843, roughness: 1 });
    const hay = new THREE.Mesh(hayGeo, hayMat);
    hayGroup.add(hay);

    // Straw texture bands
    for (let b = 0; b < 2; b++) {
      const bandGeo = new THREE.BoxGeometry(hayW * 1.02, 0.08, hayD * 1.02);
      const bandMat = new THREE.MeshStandardMaterial({ color: 0x8B6914 });
      const band = new THREE.Mesh(bandGeo, bandMat);
      band.position.y = -hayH * 0.2 + b * hayH * 0.4;
      hayGroup.add(band);
    }

    const dist = 10 + Math.random() * 55;
    const ang = Math.random() * Math.PI * 2;
    hayGroup.position.set(Math.cos(ang) * dist, hayH / 2, Math.sin(ang) * dist);
    hayGroup.rotation.y = Math.random() * Math.PI;
    scene.add(hayGroup);
    obstacles.push({ mesh: hayGroup, type: 'crate', vx: 0, vz: 0, size: hayW, active: true });
  }

  // Tire stack obstacles
  for (let i = 0; i < 12; i++) {
    const tireGroup = new THREE.Group();
    const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95 });
    const numTires = 2 + Math.floor(Math.random() * 2);
    for (let t = 0; t < numTires; t++) {
      const tire = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.35, 8, 12), tireMat);
      tire.rotation.x = Math.PI / 2;
      tire.position.y = t * 0.7;
      tireGroup.add(tire);
    }
    const dist = 8 + Math.random() * 60;
    const ang = Math.random() * Math.PI * 2;
    tireGroup.position.set(Math.cos(ang) * dist, 0.4, Math.sin(ang) * dist);
    scene.add(tireGroup);
    obstacles.push({ mesh: tireGroup, type: 'barrel', vx: 0, vz: 0, active: true });
  }

  // A few barrels with rusty look
  for (let i = 0; i < 8; i++) {
    const barrelGeo = new THREE.CylinderGeometry(0.7, 0.7, 1.8, 12);
    const barrelColor = [0x8B4513, 0x996633, 0x7a5230, 0xcc6600][i % 4];
    const barrelMat = new THREE.MeshStandardMaterial({ color: barrelColor, roughness: 0.85 });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    const dist = 12 + Math.random() * 55;
    const ang = Math.random() * Math.PI * 2;
    barrel.position.set(Math.cos(ang) * dist, 0.9, Math.sin(ang) * dist);

    const bandGeo = new THREE.TorusGeometry(0.72, 0.06, 4, 12);
    const bandMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
    const band1 = new THREE.Mesh(bandGeo, bandMat);
    band1.position.y = 0.4; band1.rotation.x = Math.PI / 2;
    barrel.add(band1);
    const band2 = band1.clone(); band2.position.y = -0.4;
    barrel.add(band2);

    scene.add(barrel);
    obstacles.push({ mesh: barrel, type: 'barrel', vx: 0, vz: 0, active: true });
  }

  // Extra ramps (dirt mounds) at edges
  const rampPositions = [
    { x: 35, z: 0, ry: 0 },
    { x: -35, z: 0, ry: Math.PI },
    { x: 0, z: 35, ry: Math.PI / 2 },
    { x: 0, z: -35, ry: -Math.PI / 2 },
  ];
  rampPositions.forEach(rp => {
    const rampGroup = new THREE.Group();
    rampGroup.position.set(rp.x, 0, rp.z);
    rampGroup.rotation.y = rp.ry;

    const rampW = 8;
    const rampLen = 10;
    const rampH = 2.5;
    const segments = 12;
    const dirtRampMat = new THREE.MeshStandardMaterial({ color: 0x7a5c2a, roughness: 0.9, side: THREE.DoubleSide });

    for (let i = 0; i < segments; i++) {
      const t0 = i / segments;
      const t1 = (i + 1) / segments;
      const z0 = -rampLen / 2 + t0 * rampLen;
      const z1 = -rampLen / 2 + t1 * rampLen;
      const y0 = Math.sin(t0 * Math.PI / 2) * rampH;
      const y1 = Math.sin(t1 * Math.PI / 2) * rampH;
      const segLen = Math.sqrt((z1 - z0) ** 2 + (y1 - y0) ** 2);
      const segAngle = Math.atan2(y1 - y0, z1 - z0);

      const seg = new THREE.Mesh(new THREE.BoxGeometry(rampW, 0.2, segLen + 0.05), dirtRampMat);
      seg.position.set(0, (y0 + y1) / 2, (z0 + z1) / 2);
      seg.rotation.x = -segAngle;
      rampGroup.add(seg);
    }

    const padGeo = new THREE.BoxGeometry(rampW, 0.2, 3);
    const pad = new THREE.Mesh(padGeo, dirtRampMat);
    pad.position.set(0, rampH, rampLen / 2 + 1);
    rampGroup.add(pad);

    scene.add(rampGroup);
    ramps.push({ mesh: rampGroup, x: rp.x, z: rp.z, halfW: 4, halfD: 6, ry: rp.ry });
  });
}

// ============================================================
// BUILD MONSTER TRUCK (original)
// ============================================================
function createMonsterTruck(color, index) {
  const group = new THREE.Group();
  const paintMat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.4 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6 });
  const chromeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });

  // CHASSIS
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.7 });
  [-0.6, 0.6].forEach(x => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 5.0), frameMat);
    rail.position.set(x, 0.0, 0);
    group.add(rail);
  });
  [-1.5, 0, 1.5].forEach(z => {
    const cross = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 0.2), frameMat);
    cross.position.set(0, 0.0, z);
    group.add(cross);
  });
  const xGeo1 = new THREE.BoxGeometry(0.1, 0.15, 4.0);
  const xb1 = new THREE.Mesh(xGeo1, frameMat);
  xb1.position.set(0, -0.05, 0);
  xb1.rotation.y = 0.18;
  group.add(xb1);
  const xb2 = new THREE.Mesh(xGeo1, frameMat);
  xb2.position.set(0, -0.05, 0);
  xb2.rotation.y = -0.18;
  group.add(xb2);

  // SUSPENSION
  const shockMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8 });
  const springMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
  const wheelPositions = [
    { x: -2.0, y: -0.3, z: 1.7 },
    { x: 2.0, y: -0.3, z: 1.7 },
    { x: -2.0, y: -0.3, z: -1.7 },
    { x: 2.0, y: -0.3, z: -1.7 }
  ];
  wheelPositions.forEach(wp => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(Math.abs(wp.x) - 0.5, 0.12, 0.12), frameMat);
    arm.position.set(wp.x * 0.55, 0.1, wp.z);
    group.add(arm);
    const shock = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 1.4, 6), shockMat);
    shock.position.set(wp.x * 0.75, 0.7, wp.z);
    group.add(shock);
    for (let s = 0; s < 4; s++) {
      const coil = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.025, 4, 8), springMat);
      coil.position.set(wp.x * 0.75, 0.25 + s * 0.28, wp.z);
      coil.rotation.x = Math.PI / 2;
      group.add(coil);
    }
  });

  // BODY
  const hoodGeo = new THREE.BoxGeometry(2.8, 1.0, 2.4);
  const hood = new THREE.Mesh(hoodGeo, paintMat);
  hood.position.set(0, 1.6, 1.1);
  group.add(hood);

  const scoopGeo = new THREE.BoxGeometry(0.8, 0.25, 1.0);
  const scoop = new THREE.Mesh(scoopGeo, paintMat);
  scoop.position.set(0, 2.2, 1.2);
  group.add(scoop);

  const bumperGeo = new THREE.BoxGeometry(3.0, 0.5, 0.3);
  const bumper = new THREE.Mesh(bumperGeo, chromeMat);
  bumper.position.set(0, 1.2, 2.4);
  group.add(bumper);

  const grilleMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
  const grilleGeo = new THREE.BoxGeometry(2.0, 0.6, 0.1);
  const grille = new THREE.Mesh(grilleGeo, grilleMat);
  grille.position.set(0, 1.6, 2.32);
  group.add(grille);
  for (let g = -0.2; g <= 0.2; g += 0.1) {
    const slat = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.03, 0.12), chromeMat);
    slat.position.set(0, 1.6 + g, 2.33);
    group.add(slat);
  }

  // CAB
  const cabGeo = new THREE.BoxGeometry(2.6, 1.2, 2.0);
  const cab = new THREE.Mesh(cabGeo, paintMat);
  cab.position.set(0, 2.7, -0.2);
  group.add(cab);

  const windGeo = new THREE.BoxGeometry(2.2, 0.9, 0.08);
  const windMat = new THREE.MeshStandardMaterial({ color: 0x446688, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.6 });
  const wind = new THREE.Mesh(windGeo, windMat);
  wind.position.set(0, 2.65, 0.85);
  wind.rotation.x = 0.25;
  group.add(wind);

  const rearWind = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 0.08), windMat);
  rearWind.position.set(0, 2.7, -1.15);
  group.add(rearWind);

  [-1.32, 1.32].forEach(x => {
    const sideWin = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.7, 1.4), windMat);
    sideWin.position.set(x, 2.7, -0.1);
    group.add(sideWin);
  });

  const roofGeo = new THREE.BoxGeometry(2.65, 0.12, 2.05);
  const roof = new THREE.Mesh(roofGeo, paintMat);
  roof.position.set(0, 3.32, -0.2);
  group.add(roof);

  // BED
  const bedFloor = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.15, 2.6), paintMat);
  bedFloor.position.set(0, 1.55, -1.9);
  group.add(bedFloor);
  [-1.35, 1.35].forEach(x => {
    const side = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.7, 2.6), paintMat);
    side.position.set(x, 1.95, -1.9);
    group.add(side);
  });
  const tailgate = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.7, 0.12), paintMat);
  tailgate.position.set(0, 1.95, -3.15);
  group.add(tailgate);
  const rBumper = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.4, 0.25), chromeMat);
  rBumper.position.set(0, 1.25, -3.2);
  group.add(rBumper);

  // HEADLIGHTS
  [-1.05, 1.05].forEach(x => {
    const hlGeo = new THREE.SphereGeometry(0.22, 8, 8);
    const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.9 });
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(x, 1.65, 2.35);
    group.add(hl);
  });

  [-1.1, 1.1].forEach(x => {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.1),
      new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 }));
    tl.position.set(x, 1.8, -3.22);
    group.add(tl);
  });

  // EXHAUST
  [-1.45, 1.45].forEach(x => {
    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 2.5, 8), darkMat);
    pipe.position.set(x, 2.3, 0.3);
    group.add(pipe);
    const tip = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.1, 0.2, 8), chromeMat);
    tip.position.set(x, 3.55, 0.3);
    group.add(tip);
  });

  // MONSTER WHEELS
  const wheelRadius = 1.5;
  const wheelWidth = 1.2;
  const tireGeo = new THREE.TorusGeometry(wheelRadius, wheelWidth / 2, 16, 24);
  const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
  const hubGeo = new THREE.CylinderGeometry(0.6, 0.6, wheelWidth * 0.3, 12);
  const hubMat = new THREE.MeshStandardMaterial({ color: 0xddaa00, metalness: 0.8, roughness: 0.2 });

  const wheels = [];
  wheelPositions.forEach(wp => {
    const tire = new THREE.Mesh(tireGeo, tireMat);
    tire.rotation.z = Math.PI / 2;
    tire.rotation.y = Math.PI / 2;
    tire.position.set(wp.x, wp.y, wp.z);
    group.add(tire);
    const hub = new THREE.Mesh(hubGeo, hubMat);
    hub.rotation.z = Math.PI / 2;
    hub.position.set(wp.x, wp.y, wp.z);
    group.add(hub);
    wheels.push(tire);
  });

  // ROLL CAGE
  const cageMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9 });
  [3.0, 3.35].forEach(y => {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(2.7, 0.07, 0.07), cageMat);
    bar.position.set(0, y, -1.2);
    group.add(bar);
  });
  [-1.2, 1.2].forEach(x => {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.6, 0.07), cageMat);
    post.position.set(x, 3.15, -1.2);
    group.add(post);
  });

  group.position.y = GROUND_Y;
  scene.add(group);
  return { mesh: group, wheels, color, index };
}

// ============================================================
// CARS 2 MODE — Character Builders with EYES on windshield
// ============================================================

function addCarEyes(group, y, z, width, height) {
  // Windshield with eyes — like the Cars movies
  const windMat = new THREE.MeshStandardMaterial({ color: 0xd4eeff, roughness: 0.1, metalness: 0.2, transparent: true, opacity: 0.85 });
  const windshield = new THREE.Mesh(new THREE.BoxGeometry(width || 2.4, height || 0.9, 0.08), windMat);
  windshield.position.set(0, y, z);
  windshield.rotation.x = 0.2;
  group.add(windshield);

  // Eye whites
  const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  [-0.4, 0.4].forEach(x => {
    const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 12), eyeWhiteMat);
    eyeWhite.scale.set(1, 1.2, 0.5);
    eyeWhite.position.set(x, y + 0.05, z + 0.06);
    group.add(eyeWhite);

    // Pupil
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), pupilMat);
    pupil.position.set(x, y + 0.0, z + 0.12);
    group.add(pupil);

    // Eyelid (half-closed look, adds personality)
    const lidMat = new THREE.MeshStandardMaterial({ color: 0xd4eeff, transparent: true, opacity: 0.6 });
    const lid = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.1, 0.1), lidMat);
    lid.position.set(x, y + 0.2, z + 0.08);
    group.add(lid);
  });
}

function addNormalWheels(group, positions, color) {
  const wheelRadius = 0.55;
  const wheelWidth = 0.4;
  const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
  const hubMat = new THREE.MeshStandardMaterial({ color: color || 0x888888, metalness: 0.7, roughness: 0.3 });
  const wheels = [];

  positions.forEach(wp => {
    const tire = new THREE.Mesh(new THREE.TorusGeometry(wheelRadius, wheelWidth / 2, 12, 20), tireMat);
    tire.rotation.z = Math.PI / 2;
    tire.rotation.y = Math.PI / 2;
    tire.position.set(wp.x, wp.y, wp.z);
    group.add(tire);

    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, wheelWidth * 0.4, 10), hubMat);
    hub.rotation.z = Math.PI / 2;
    hub.position.set(wp.x, wp.y, wp.z);
    group.add(hub);
    wheels.push(tire);
  });
  return wheels;
}

// --- MRS. FRITTER (School Bus) ---
function createMrsFritter(index) {

    );

  // Front face

  front.position.set(0, 1.8, 3.05);

    spike.position.set(i * 0.8, 0.8, 3.5);

  stopSign.rotation.z = Math.PI / 2;
  stopSign.position.set(-1.5, 2.0, 0.5);

  stopPole.rotation.z = Math.PI / 2;
  stopPole.position.set(-1.7, 2.0, 0.5);
  group.add(stopPole);

  // Windows (broken/cracked look — smaller)

  for (let w = 0; w < 4; w++) {
    [-1.42, 1.42].forEach(x => {
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.7), winMat);
      win.position.set(x, 2.2, 1.5 - w * 1.2);
      group.add(win);
    });

  // Eyes on windshield
  addCarEyes(group, 2.2, 3.1, 2.4, 0.9);

  rear.position.set(0, 1.8, -3.05);
  group.add(rear);

  // Taillights
  [-1.0, 1.0].forEach(x => {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.12),
      new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff3300, emissiveIntensity: 0.5 }));
    tl.position.set(x, 1.5, -3.1);
    group.add(tl);
  });

  // Wheels — normal size
  const wheelPos = [
    { x: -1.5, y: 0.5, z: 2.0 },
    { x: 1.5, y: 0.5, z: 2.0 },
    { x: -1.5, y: 0.5, z: -2.0 },

// UNIFIED TRUCK CREATOR
// ============================================================
function createTruck(colorOrChar, index) {
  if (gameMode === 'monster') {
    return createMonsterTruck(colorOrChar, index);
  }

  // Cars 2 mode — pick the right builder
  const charIndex = index % CARS2_CHARACTERS.length;
  const builders = [createMrsFritter, createDrDamage, createArvy, createAPB, createLightningMcQueen, createCruzRamirez];
  const result = builders[charIndex](index);

  return {
    ...result,
    health: MAX_HEALTH,
    speed: 0,
    rotationY: 0,
    vy: 0,
    onGround: true,
    alive: true,
    boosts: 3,
    boosting: false,
    boostTimer: 0,
    jumpCooldown: 0,
    aiTimer: 0,
    aiTargetAngle: 0,
    aiAccel: false,
    aiTarget: null,
    flashTimer: 0,
    smokeParticles: []
  };
}
